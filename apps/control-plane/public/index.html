<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Plane — Local Review Runtime</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div style="display:flex;flex-direction:column;width:100%;">
    <!-- STATIC REVIEW BANNER — always visible -->
    <div class="review-banner">
      LOCAL DEV REVIEW — FIXTURE-BACKED ·
      Read-only · No persistence ·
      Write actions open review-only simulation dialogs (no real execution)
      <span class="role-switcher">
        | Role: <select id="role-selector" onchange="switchRole(this.value)">
          <option value="platform-operator">platform-operator</option>
          <option value="tenant-admin">tenant-admin</option>
          <option value="clinician">clinician</option>
          <option value="ancillary-staff">ancillary-staff</option>
          <option value="revenue-cycle-staff">revenue-cycle-staff</option>
          <option value="analyst">analyst</option>
          <option value="it-integration">it-integration</option>
        </select>
      </span>
    </div>

    <div class="shell">
      <!-- Left navigation -->
      <nav class="nav-sidebar">
        <h2>Control Plane</h2>
        <a href="#/tenants" data-route="tenants">Tenant Registry</a>
        <a href="#/tenants/detail" data-route="tenants-detail">Tenant Detail</a>
        <a href="#/tenants/bootstrap" data-route="tenants-bootstrap">Tenant Bootstrap</a>
        <a href="#/provisioning" data-route="provisioning">Provisioning Runs</a>
        <a href="#/markets" data-route="markets">Market Management</a>
        <a href="#/markets/detail" data-route="markets-detail">Market Detail</a>
        <a href="#/packs" data-route="packs">Pack Catalog</a>
        <a href="#/system-config" data-route="system-config">System Configuration</a>
      </nav>

      <!-- Main content area -->
      <main class="main-content" id="app">
        <!-- Rendered by app.js -->
      </main>
    </div>
  </div>

  <!-- Review dialog overlay (populated by app.js) -->
  <div id="review-dialog-overlay" class="review-overlay" style="display:none;">
    <div class="review-dialog" id="review-dialog"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
