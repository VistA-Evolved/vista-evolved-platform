# Decision Index
# Enterprise-namespaced ADR registry for VistA Evolved.
#
# Naming convention:
#   VE-GOV-ADR-NNNN    — Cross-repo governance decisions
#   VE-ARCH-ADR-NNNN   — Cross-repo architecture decisions
#   VE-PLAT-ADR-NNNN   — vista-evolved-platform decisions
#   VE-DISTRO-ADR-NNNN — vista-evolved-vista-distro decisions
#
# Rules:
#   - IDs are globally unique across all VistA Evolved repos.
#   - Every ADR file must be registered here.
#   - Status: proposed | accepted | deprecated | superseded
#   - New ADRs take the next available number in their namespace.

