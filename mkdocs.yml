site_name: VistA Evolved Platform
site_description: Governance, architecture, runbooks, and API reference for VistA Evolved Platform
repo_url: https://github.com/vista-evolved/vista-evolved-platform
repo_name: vista-evolved-platform
copyright: "VistA Evolved Platform &mdash; Governed, Proof-Driven Build"

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.path
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow
    - toc.integrate

plugins:
  - search:
      lang: en
  - minify:
      minify_html: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vista-evolved
  analytics:
    provider: custom

nav:
  - Home: index.md

  - Getting Started:
    - tutorials/index.md
    - Getting Started: tutorials/getting-started.md
    - Architecture Overview: explanation/global-system-architecture-spec.md
    - Docker-First Workflow: how-to/docker-first.md

  - How-To Guides:
    - how-to/index.md
    - Docker & Runtime:
      - how-to/docker-first.md
      - how-to/start-vista-docker.md
      - how-to/verify-vista-connection.md
    - Tenant Admin:
      - how-to/add-vista-user.md
      - how-to/create-clinic.md
      - how-to/assign-security-key.md
    - Operator:
      - how-to/bootstrap-new-tenant.md
      - how-to/configure-billing.md

  - Runbooks:
    - runbooks/index.md
    - Lago Billing Setup: runbooks/lago-billing-setup.md
    - Bootstrap Report: runbooks/bootstrap-report.md
    - Terminal Proof Report: runbooks/terminal-proof-report.md
    - Vista Provisioning: runbooks/vista-provisioning.md
    - Vista Baselines: runbooks/vista-baselines.md

  - Architecture:
    - explanation/index.md
    - Core Architecture:
      - Global System Architecture: explanation/global-system-architecture-spec.md
      - Tenant Admin Architecture: explanation/tenant-admin-architecture-and-boundaries.md
      - Operator-to-Tenant Handoff: explanation/operator-to-tenant-admin-handoff-model.md
      - Governed Build Protocol: explanation/governed-build-protocol.md
      - AI Coding Governance: explanation/ai-coding-governance-and-sdlc.md
    - Control Plane:
      - Service Map: explanation/control-plane-service-map-and-operator-console-architecture.md
      - Tenant Lifecycle: explanation/control-plane-tenant-lifecycle-and-orchestration-model.md
      - Bootstrap & Provisioning: explanation/control-plane-operator-bootstrap-and-provisioning-contract-map.md
    - VistA Integration:
      - VistA Admin Coverage Map: reference/vista-admin-coverage-map.md
      - VistA Admin Truth Map: explanation/tenant-admin-vista-truth-map.md
      - VistA Admin Guided Write Workflows: explanation/vista-admin-guided-write-workflows.md
      - VistA RPC Reference: reference/vista-rpc-reference-data.md
      - Live Broker Canonical Path: explanation/live-broker-canonical-path.md
    - Modularity & Packs:
      - Pack and Adapter Architecture: explanation/pack-and-adapter-architecture-governance.md
      - Capability Truth: explanation/capability-truth-and-claim-gating-spec.md
      - Country and Payer Readiness: explanation/country-and-payer-readiness-registry-spec.md

  - Reference:
    - reference/index.md
    - Source of Truth Index: reference/source-of-truth-index.md
    - Port Registry: reference/port-registry.md
    - Permissions Matrix: reference/permissions-matrix.md
    - Screen Inventory: reference/screen-inventory.md
    - Data Ownership Matrix: reference/data-ownership-matrix.md
    - Doc Governance: reference/doc-governance.md
    - Persistence Policy: reference/persistence-policy.md
    - Boundary Policy: reference/boundary-policy.md
    - Contract System: reference/contract-system.md
    - Contract Policy: reference/contract-policy.md
    - Decision Index: reference/decision-index.yaml

  - ADRs:
    - adrs/index.md
    - "VE-PLAT-ADR-0001: Three-Repo Architecture": adrs/VE-PLAT-ADR-0001-three-repo-architecture.md
    - "VE-PLAT-ADR-0002: Contract-First Architecture": adrs/VE-PLAT-ADR-0002-contract-first-architecture.md
    - "VE-PLAT-ADR-0003: Control Plane vs Tenant Admin": adrs/VE-PLAT-ADR-0003-control-plane-vs-tenant-admin.md
    - "VE-PLAT-ADR-0004: Billing System (Lago)": adrs/VE-PLAT-ADR-0004-billing-system-lago.md
    - "VE-PLAT-ADR-0005: Platform DB Naming": adrs/VE-PLAT-ADR-0005-platform-db-naming.md

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - def_list
  - tables
  - md_in_html
  - footnotes
  - abbr

extra_css:
  - assets/extra.css
