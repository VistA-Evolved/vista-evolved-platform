asyncapi: '3.0.0'
info:
  title: Control-Plane Provisioning Events
  version: 0.2.0
  description: |
    Event contract for operator-initiated tenant lifecycle, bootstrap, and provisioning workflows.

    **Scope:** Events emitted by the control-plane during:
    - Tenant lifecycle transitions (suspend, reactivate, archive)
    - Bootstrap request processing
    - Asynchronous provisioning run execution and control (including cancel)

    Consumed by:
    - Provisioning orchestrator (picks up work, receives cancel signals)
    - Operator control panel (real-time status updates)
    - Audit subsystem (immutable event trail)
    - Data retention service (archive events)

    This contract does NOT define events for: clinical workflows, public signup,
    billing, tenant-admin operations, or provisioning engine internals.

    **Every event carries:** eventId, eventType, occurredAt, correlationId,
    and the relevant domain identifiers (tenantId, bootstrapRequestId,
    provisioningRunId, effectivePlanId, legalMarketId).

    **No PHI:** These events contain only operational/infrastructure identifiers.
    Patient data never flows through bootstrap/provisioning events.
  contact:
    name: VistA Evolved Platform Team
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only

defaultContentType: application/json

channels:
  tenantBootstrapRequested:
    address: tenant.bootstrap.requested
    description: |
      Emitted when an operator submits a tenant bootstrap request.
      Consumers: provisioning eligibility evaluator, audit subsystem.
    messages:
      tenantBootstrapRequestedMessage:
        $ref: '#/components/messages/TenantBootstrapRequested'

  effectivePlanResolved:
    address: effective-plan.resolved
    description: |
      Emitted when the composition resolver produces an effective-tenant-configuration plan.
      Consumers: operator control panel (plan review), audit subsystem.
      This is an informational event — the resolved plan may contain deferred items
      and gating blockers. It does NOT imply production readiness.
    messages:
      effectivePlanResolvedMessage:
        $ref: '#/components/messages/EffectivePlanResolved'

  provisioningRunRequested:
    address: provisioning.run.requested
    description: |
      Emitted when an operator initiates a provisioning run for an approved bootstrap request.
      Consumers: provisioning orchestrator (picks up and begins execution), audit subsystem.
    messages:
      provisioningRunRequestedMessage:
        $ref: '#/components/messages/ProvisioningRunRequested'

  provisioningRunStarted:
    address: provisioning.run.started
    description: |
      Emitted when the provisioning orchestrator begins executing a queued run.
      Consumers: operator control panel (status update), audit subsystem.
    messages:
      provisioningRunStartedMessage:
        $ref: '#/components/messages/ProvisioningRunStarted'

  provisioningStepChanged:
    address: provisioning.step.changed
    description: |
      Emitted when a provisioning step transitions state (pending -> in-progress -> completed/failed/skipped).
      Consumers: operator control panel (progress updates), audit subsystem.
      May be emitted multiple times per run (once per step transition).
    messages:
      provisioningStepChangedMessage:
        $ref: '#/components/messages/ProvisioningStepChanged'

  provisioningRunCompleted:
    address: provisioning.run.completed
    description: |
      Emitted when all provisioning steps have completed successfully.
      Consumers: operator control panel (completion notification), bootstrap request status updater, audit subsystem.
    messages:
      provisioningRunCompletedMessage:
        $ref: '#/components/messages/ProvisioningRunCompleted'

  provisioningRunFailed:
    address: provisioning.run.failed
    description: |
      Emitted when a provisioning run fails and cannot self-recover.
      Consumers: operator control panel (failure alert), bootstrap request status updater, audit subsystem, alerting.
      Includes failure details and affected step for operator diagnosis.
    messages:
      provisioningRunFailedMessage:
        $ref: '#/components/messages/ProvisioningRunFailed'

  # --- Tenant lifecycle events (Batch 2) ---

  tenantLifecycleSuspended:
    address: tenant.lifecycle.suspended
    description: |
      Emitted when an operator suspends an active tenant.
      Consumers: operator control panel (status refresh), audit subsystem, access control (revoke sessions).
    messages:
      tenantLifecycleSuspendedMessage:
        $ref: '#/components/messages/TenantLifecycleSuspended'

  tenantLifecycleReactivated:
    address: tenant.lifecycle.reactivated
    description: |
      Emitted when an operator reactivates a suspended tenant.
      Consumers: operator control panel (status refresh), audit subsystem, access control (restore access).
    messages:
      tenantLifecycleReactivatedMessage:
        $ref: '#/components/messages/TenantLifecycleReactivated'

  tenantLifecycleArchived:
    address: tenant.lifecycle.archived
    description: |
      Emitted when an operator archives a suspended tenant. This is an irreversible transition.
      Consumers: operator control panel (status refresh), audit subsystem, data retention service, access control (permanently revoke access).
    messages:
      tenantLifecycleArchivedMessage:
        $ref: '#/components/messages/TenantLifecycleArchived'

  # --- Provisioning control events (Batch 2) ---

  provisioningRunCancelRequested:
    address: provisioning.run.cancel.requested
    description: |
      Emitted when an operator requests cancellation of a queued or in-progress provisioning run.
      Consumers: provisioning orchestrator (signals graceful stop), audit subsystem.
      The orchestrator should stop initiating new steps and allow in-flight steps to complete naturally.
    messages:
      provisioningRunCancelRequestedMessage:
        $ref: '#/components/messages/ProvisioningRunCancelRequested'

  provisioningRunCancelled:
    address: provisioning.run.cancelled
    description: |
      Emitted when the provisioning orchestrator completes graceful wind-down after a cancel request.
      The run has reached its terminal `cancelled` state. Completed steps remain completed;
      pending steps were skipped. This is the terminal event for the cancel workflow.
      Consumers: operator control panel (terminal status), bootstrap request status updater, audit subsystem.
    messages:
      provisioningRunCancelledMessage:
        $ref: '#/components/messages/ProvisioningRunCancelled'

operations:
  onTenantBootstrapRequested:
    action: receive
    channel:
      $ref: '#/channels/tenantBootstrapRequested'
    summary: Receive event when operator submits a bootstrap request.

  onEffectivePlanResolved:
    action: receive
    channel:
      $ref: '#/channels/effectivePlanResolved'
    summary: Receive event when a plan is resolved.

  onProvisioningRunRequested:
    action: receive
    channel:
      $ref: '#/channels/provisioningRunRequested'
    summary: Receive event when a provisioning run is initiated.

  onProvisioningRunStarted:
    action: receive
    channel:
      $ref: '#/channels/provisioningRunStarted'
    summary: Receive event when the orchestrator starts executing a run.

  onProvisioningStepChanged:
    action: receive
    channel:
      $ref: '#/channels/provisioningStepChanged'
    summary: Receive event when a provisioning step changes state.

  onProvisioningRunCompleted:
    action: receive
    channel:
      $ref: '#/channels/provisioningRunCompleted'
    summary: Receive event when a provisioning run completes successfully.

  onProvisioningRunFailed:
    action: receive
    channel:
      $ref: '#/channels/provisioningRunFailed'
    summary: Receive event when a provisioning run fails.

  # --- Tenant lifecycle operations (Batch 2) ---

  onTenantLifecycleSuspended:
    action: receive
    channel:
      $ref: '#/channels/tenantLifecycleSuspended'
    summary: Receive event when an operator suspends a tenant.

  onTenantLifecycleReactivated:
    action: receive
    channel:
      $ref: '#/channels/tenantLifecycleReactivated'
    summary: Receive event when an operator reactivates a tenant.

  onTenantLifecycleArchived:
    action: receive
    channel:
      $ref: '#/channels/tenantLifecycleArchived'
    summary: Receive event when an operator archives a tenant.

  # --- Provisioning control operations (Batch 2) ---

  onProvisioningRunCancelRequested:
    action: receive
    channel:
      $ref: '#/channels/provisioningRunCancelRequested'
    summary: Receive event when an operator requests cancellation of a provisioning run.

  onProvisioningRunCancelled:
    action: receive
    channel:
      $ref: '#/channels/provisioningRunCancelled'
    summary: Receive event when a provisioning run reaches cancelled terminal state.

components:
  messages:
    TenantBootstrapRequested:
      name: TenantBootstrapRequested
      title: Tenant Bootstrap Requested
      summary: An operator submitted a tenant bootstrap request.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TenantBootstrapRequestedPayload'

    EffectivePlanResolved:
      name: EffectivePlanResolved
      title: Effective Plan Resolved
      summary: The composition resolver produced an effective-tenant-configuration plan.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/EffectivePlanResolvedPayload'

    ProvisioningRunRequested:
      name: ProvisioningRunRequested
      title: Provisioning Run Requested
      summary: An operator initiated an asynchronous provisioning run.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProvisioningRunRequestedPayload'

    ProvisioningRunStarted:
      name: ProvisioningRunStarted
      title: Provisioning Run Started
      summary: The provisioning orchestrator began executing a run.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProvisioningRunStartedPayload'

    ProvisioningStepChanged:
      name: ProvisioningStepChanged
      title: Provisioning Step Changed
      summary: A provisioning step transitioned state.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProvisioningStepChangedPayload'

    ProvisioningRunCompleted:
      name: ProvisioningRunCompleted
      title: Provisioning Run Completed
      summary: All provisioning steps completed successfully.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProvisioningRunCompletedPayload'

    ProvisioningRunFailed:
      name: ProvisioningRunFailed
      title: Provisioning Run Failed
      summary: A provisioning run failed and cannot self-recover.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProvisioningRunFailedPayload'

    # --- Tenant lifecycle messages (Batch 2) ---

    TenantLifecycleSuspended:
      name: TenantLifecycleSuspended
      title: Tenant Lifecycle Suspended
      summary: An operator suspended an active tenant.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TenantLifecycleSuspendedPayload'

    TenantLifecycleReactivated:
      name: TenantLifecycleReactivated
      title: Tenant Lifecycle Reactivated
      summary: An operator reactivated a suspended tenant.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TenantLifecycleReactivatedPayload'

    TenantLifecycleArchived:
      name: TenantLifecycleArchived
      title: Tenant Lifecycle Archived
      summary: An operator archived a suspended tenant (irreversible).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TenantLifecycleArchivedPayload'

    # --- Provisioning control messages (Batch 2) ---

    ProvisioningRunCancelRequested:
      name: ProvisioningRunCancelRequested
      title: Provisioning Run Cancel Requested
      summary: An operator requested cancellation of a provisioning run.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProvisioningRunCancelRequestedPayload'

    ProvisioningRunCancelled:
      name: ProvisioningRunCancelled
      title: Provisioning Run Cancelled
      summary: A provisioning run reached cancelled terminal state after graceful wind-down.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProvisioningRunCancelledPayload'

  schemas:
    # --- Common event envelope fields ---
    # All payloads include: eventId, eventType, occurredAt, correlationId

    TenantBootstrapRequestedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - bootstrapRequestId
        - tenantId
        - effectivePlanId
        - legalMarketId
        - requestedBy
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique event identifier.
        eventType:
          type: string
          const: tenant.bootstrap.requested
        occurredAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the event occurred.
        correlationId:
          type: string
          format: uuid
          description: End-to-end workflow correlation identifier.
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
          description: Assigned tenant identifier.
        effectivePlanId:
          type: string
          format: uuid
        legalMarketId:
          type: string
        requestedBy:
          type: string
          description: Operator identity (from auth context, not user-supplied).

    EffectivePlanResolvedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - effectivePlanId
        - legalMarketId
        - resolvedPackCount
        - deferredItemCount
        - effectiveLaunchTier
        - requestedBy
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: effective-plan.resolved
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        effectivePlanId:
          type: string
          format: uuid
        legalMarketId:
          type: string
        resolvedPackCount:
          type: integer
          description: Number of packs in the resolved plan.
        deferredItemCount:
          type: integer
          description: Number of deferred items. Zero means no packs were deferred.
        effectiveLaunchTier:
          type: string
          enum: [T0, T1, T2, T3]
        requestedBy:
          type: string

    ProvisioningRunRequestedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
        - effectivePlanId
        - legalMarketId
        - requestedBy
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: provisioning.run.requested
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        effectivePlanId:
          type: string
          format: uuid
        legalMarketId:
          type: string
        requestedBy:
          type: string

    ProvisioningRunStartedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: provisioning.run.started
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        totalStepCount:
          type: integer
          description: Total number of provisioning steps planned.

    ProvisioningStepChangedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - provisioningRunId
        - tenantId
        - stepId
        - stepName
        - previousStatus
        - newStatus
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: provisioning.step.changed
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
        tenantId:
          type: string
        stepId:
          type: string
        stepName:
          type: string
        previousStatus:
          type: string
          enum: [pending, in-progress, completed, failed, skipped]
        newStatus:
          type: string
          enum: [pending, in-progress, completed, failed, skipped]
        detail:
          type: string
          description: Optional detail about the transition.

    ProvisioningRunCompletedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
        - effectivePlanId
        - totalStepCount
        - completedStepCount
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: provisioning.run.completed
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        effectivePlanId:
          type: string
          format: uuid
        totalStepCount:
          type: integer
        completedStepCount:
          type: integer
        durationMs:
          type: integer
          description: Total provisioning run duration in milliseconds.

    ProvisioningRunFailedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
        - failedStepId
        - failureType
        - failureDescription
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: provisioning.run.failed
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        effectivePlanId:
          type: string
          format: uuid
        failedStepId:
          type: string
        failedStepName:
          type: string
        failureType:
          type: string
          description: Category (infrastructure-error, adapter-error, dependency-error, timeout, unknown).
        failureDescription:
          type: string
        completedStepCount:
          type: integer
          description: Number of steps that completed before the failure.
        totalStepCount:
          type: integer

    # --- Tenant lifecycle event payloads (Batch 2) ---

    TenantLifecycleSuspendedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - tenantId
        - previousStatus
        - newStatus
        - reason
        - requestedBy
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: tenant.lifecycle.suspended
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        tenantId:
          type: string
        previousStatus:
          type: string
          const: active
        newStatus:
          type: string
          const: suspended
        reason:
          type: string
          description: Operator-provided reason for suspending the tenant.
        requestedBy:
          type: string
          description: Operator identity (from auth context, not user-supplied).

    TenantLifecycleReactivatedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - tenantId
        - previousStatus
        - newStatus
        - reason
        - requestedBy
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: tenant.lifecycle.reactivated
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        tenantId:
          type: string
        previousStatus:
          type: string
          const: suspended
        newStatus:
          type: string
          const: active
        reason:
          type: string
          description: Operator-provided reason for reactivating the tenant.
        requestedBy:
          type: string
          description: Operator identity (from auth context, not user-supplied).

    TenantLifecycleArchivedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - tenantId
        - previousStatus
        - newStatus
        - reason
        - confirmArchive
        - requestedBy
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: tenant.lifecycle.archived
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        tenantId:
          type: string
        previousStatus:
          type: string
          const: suspended
        newStatus:
          type: string
          const: archived
        reason:
          type: string
          description: Operator-provided reason for archiving the tenant.
        confirmArchive:
          type: boolean
          const: true
          description: Confirmation flag proving explicit operator intent.
        requestedBy:
          type: string
          description: Operator identity (from auth context, not user-supplied).

    # --- Provisioning control event payloads (Batch 2) ---

    ProvisioningRunCancelRequestedPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
        - previousRunStatus
        - reason
        - requestedBy
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: provisioning.run.cancel.requested
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        previousRunStatus:
          type: string
          enum: [queued, in-progress]
          description: The run's status before the cancel request was accepted.
        reason:
          type: string
          description: Operator-provided reason for cancelling the run.
        requestedBy:
          type: string
          description: Operator identity (from auth context, not user-supplied).

    ProvisioningRunCancelledPayload:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
        - correlationId
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
        - completedStepCount
        - skippedStepCount
        - totalStepCount
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          const: provisioning.run.cancelled
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        effectivePlanId:
          type: string
          format: uuid
        completedStepCount:
          type: integer
          description: Number of steps that completed before cancellation.
        skippedStepCount:
          type: integer
          description: Number of pending steps that were skipped due to cancellation.
        totalStepCount:
          type: integer
        durationMs:
          type: integer
          description: Total duration from run start to cancelled terminal state in milliseconds.
