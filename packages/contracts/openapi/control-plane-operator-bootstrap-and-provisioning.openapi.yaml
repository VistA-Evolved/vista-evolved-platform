openapi: '3.1.0'
info:
  title: Control-Plane Operator Bootstrap and Provisioning API
  version: 0.1.0
  description: |
    Operator-initiated tenant lifecycle, bootstrap, and provisioning contract for VistA Evolved control plane.

    **Scope:** This contract covers operator-facing control-plane reads (including read-only
    access to the pack catalog and system configuration for operator review), bootstrap, and
    provisioning operations. It does NOT cover public self-service signup, billing, tenant-admin
    configuration, clinical APIs, provisioning engine internals, pack catalog write/management
    operations, or system configuration write/management operations.

    **Asynchronous model:** Provisioning is a multi-step asynchronous workflow. POST operations
    that initiate work return 202 Accepted. Clients poll GET endpoints for status.

    **Current PH truth:** The PH legal market is draft/T0. All PH packs are lifecycle draft.
    No capability is claimable or production-eligible. This API surface reflects those constraints
    truthfully in all responses.
  contact:
    name: VistA Evolved Platform Team
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only

servers:
  - url: /api/control-plane/v1
    description: Control-plane API base path (version 1)

security:
  - operatorBearerAuth: []

tags:
  - name: tenants
    description: Tenant registry reads for operator review and lifecycle management.
  - name: legal-market-profiles
    description: Read-only access to legal-market profile summaries for operator review.
  - name: effective-configuration-plans
    description: Plan resolution from market profile and operator selections.
  - name: tenant-bootstrap-requests
    description: Operator-initiated bootstrap request lifecycle.
  - name: provisioning-runs
    description: Asynchronous provisioning run lifecycle.
  - name: packs
    description: Read-only access to the pack catalog for operator review during bootstrap and provisioning.
  - name: system-config
    description: Read-only access to platform system configuration for operator review.

paths:
  /tenants:
    get:
      operationId: listTenants
      summary: List tenants with optional filters
      description: |
        Returns a paginated list of tenants visible to the authenticated operator.
        Supports filtering by status, legal market, and text search on tenant name/ID.

        This is the data source for the `control-plane.tenants.list` surface.
      tags: [tenants]
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by tenant lifecycle status. Multiple values comma-separated.
          schema:
            type: string
        - name: legalMarketId
          in: query
          required: false
          description: Filter by legal market identifier.
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Text search on tenant display name or ID.
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of tenant summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      summary: Get a single tenant's detail
      description: |
        Returns full detail for a single tenant, including configuration summary,
        bootstrap history references, and active provisioning state.

        This is the data source for the `control-plane.tenants.detail` surface.
      tags: [tenants]
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant detail found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /legal-market-profiles:
    get:
      operationId: listLegalMarketProfiles
      summary: List all legal-market profile summaries
      description: |
        Returns a list of all configured legal-market profiles with summary readiness
        data. Supports filtering by status and launch tier.

        This is the data source for the `control-plane.markets.management` surface.
      tags: [legal-market-profiles]
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by profile status.
          schema:
            type: string
            enum: [draft, active, deprecated, retired]
        - name: launchTier
          in: query
          required: false
          description: Filter by launch tier.
          schema:
            type: string
            enum: [T0, T1, T2, T3]
      responses:
        '200':
          description: List of legal-market profile summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalMarketProfileListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /legal-market-profiles/{legalMarketId}:
    get:
      operationId: getLegalMarketProfile
      summary: Retrieve a legal-market profile for operator review
      description: |
        Returns the legal-market profile summary for the specified market.
        Includes mandated/default-on/eligible/excluded packs, readiness dimensions,
        and launch tier. This is a read-only operation for operator review before
        initiating plan resolution.

        **Does not imply production readiness.** The response includes the profile's
        `status` and `launchTier` fields which may be `draft` and `T0` respectively.
      tags: [legal-market-profiles]
      parameters:
        - $ref: '#/components/parameters/LegalMarketIdPath'
      responses:
        '200':
          description: Legal-market profile found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalMarketProfileSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /effective-configuration-plans\:resolve:
    post:
      operationId: resolveEffectiveConfigurationPlan
      summary: Resolve an effective-tenant-configuration plan
      description: |
        Accepts operator selections (legal market, facility type, optional pack selections)
        and runs the composition resolver to produce an effective-tenant-configuration plan.

        The resolved plan includes:
        - **resolvedPacks:** packs that will be activated, with their current lifecycle and readiness states
        - **deferredItems:** packs that cannot be activated, with explicit reasons (pack-not-published, adapter-unavailable, dependency-missing, eligibility-failed, readiness-insufficient, infrastructure-pending)
        - **readinessPosture:** per-dimension readiness aggregate with effective launch tier and gating blockers

        The plan is a **snapshot** — it captures the state of truth at resolution time.
        Deferred items and gating blockers are first-class fields, not hidden validation notes.

        The resolved plan is stored and assigned an `effectivePlanId` for downstream reference.
      tags: [effective-configuration-plans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanResolutionRequest'
      responses:
        '200':
          description: Plan resolved successfully. May contain deferredItems and gating blockers — this is NOT an error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResolutionResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Referenced legal-market profile not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Resolution blocked — profile is in an unresolvable state (e.g., retired) or operator selections conflict with profile constraints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tenant-bootstrap-requests:
    get:
      operationId: listTenantBootstrapRequests
      summary: List bootstrap requests with optional filters
      description: |
        Returns a paginated list of bootstrap requests. Supports filtering by tenantId
        and status. Used by the `control-plane.tenants.detail` surface to show bootstrap
        history for a specific tenant.
      tags: [tenant-bootstrap-requests]
      parameters:
        - name: tenantId
          in: query
          required: false
          description: Filter by tenant identifier.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by bootstrap request status.
          schema:
            type: string
            enum: [pending, approved, provisioning, completed, failed, cancelled]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of bootstrap request summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapRequestListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createTenantBootstrapRequest
      summary: Create an operator-initiated tenant bootstrap request
      description: |
        Submits a bootstrap request referencing a previously resolved effective plan.

        This operation:
        - Validates the referenced effectivePlanId exists and is not expired
        - Creates a new tenantId (or references an existing one for re-bootstrap)
        - Records the bootstrap request as `pending`
        - Emits a `tenant.bootstrap.requested` event

        This is NOT public self-service signup. The operator must be authenticated with
        `control-plane:tenant:bootstrap` permission.

        The response is 202 Accepted — the bootstrap request is queued for provisioning
        eligibility evaluation, not immediately provisioned.
      tags: [tenant-bootstrap-requests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantBootstrapRequest'
      responses:
        '202':
          description: Bootstrap request accepted and queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantBootstrapRequestResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Referenced effectivePlanId not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate bootstrap request for this tenant and plan combination.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Bootstrap blocked — referenced plan has unresolvable gating blockers or has expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tenant-bootstrap-requests/{bootstrapRequestId}:
    get:
      operationId: getTenantBootstrapRequest
      summary: Get the status of a tenant bootstrap request
      description: |
        Returns the current status of a bootstrap request, including the referenced plan,
        the tenant identity, and whether provisioning has been queued or completed.
      tags: [tenant-bootstrap-requests]
      parameters:
        - $ref: '#/components/parameters/BootstrapRequestIdPath'
      responses:
        '200':
          description: Bootstrap request found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantBootstrapRequestStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /provisioning-runs:
    get:
      operationId: listProvisioningRuns
      summary: List provisioning runs with optional filters
      description: |
        Returns a paginated list of provisioning runs. Supports filtering by
        bootstrapRequestId and status. Used by the `control-plane.provisioning.runs`
        surface and the `control-plane.tenants.detail` surface.
      tags: [provisioning-runs]
      parameters:
        - name: bootstrapRequestId
          in: query
          required: false
          description: Filter by bootstrap request identifier.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          description: Filter by provisioning run status.
          schema:
            type: string
            enum: [queued, in-progress, completed, failed]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of provisioning run summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningRunListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createProvisioningRun
      summary: Initiate an asynchronous provisioning run
      description: |
        Starts a provisioning run for an approved bootstrap request.

        This operation:
        - Validates the bootstrapRequestId references an approved bootstrap request
        - Creates a provisioningRunId
        - Emits a `provisioning.run.requested` event
        - Returns 202 Accepted immediately — **provisioning is fully asynchronous**

        The provisioning orchestrator (not part of this API contract) picks up the run
        and progresses through steps, emitting events at each transition.

        **No endpoint in this API returns synchronous provisioning success.**
      tags: [provisioning-runs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisioningRunRequest'
      responses:
        '202':
          description: Provisioning run accepted and queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningRunResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Referenced bootstrapRequestId not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A provisioning run is already in progress for this bootstrap request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Provisioning blocked — bootstrap request is not in an approvable state, or the referenced plan has expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /provisioning-runs/{provisioningRunId}:
    get:
      operationId: getProvisioningRun
      summary: Get the status of a provisioning run
      description: |
        Returns the current state of a provisioning run including:
        - Overall run status (queued, in-progress, completed, failed)
        - Step summary with per-step status
        - Blockers and failures if any
        - Linked artifact references (plan, bootstrap request, tenant)
      tags: [provisioning-runs]
      parameters:
        - $ref: '#/components/parameters/ProvisioningRunIdPath'
      responses:
        '200':
          description: Provisioning run found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningRunStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /packs:
    get:
      operationId: listPacks
      summary: List packs in the catalog with optional filters
      description: |
        Returns a paginated list of packs from the platform pack catalog.

        Supports filtering by pack family, lifecycle state, and legal-market eligibility.
        Operators use this during bootstrap to review which packs are available and their
        current readiness state.

        **Current PH truth:** All PH packs are lifecycle draft. No pack is published or
        production-eligible. The response reflects this truthfully.
      tags: [packs]
      parameters:
        - name: packFamily
          in: query
          required: false
          schema:
            type: string
            enum: [language, locale, regulatory, national-standards, payer, specialty, tenant-overlay]
          description: Filter by pack family.
        - name: lifecycleState
          in: query
          required: false
          schema:
            type: string
            enum: [draft, validated, tested, published, activated, deactivated, retired]
          description: Filter by lifecycle state.
        - name: legalMarketId
          in: query
          required: false
          schema:
            type: string
          description: Filter to packs eligible for the specified legal market (e.g., "PH").
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Free-text search on packId, displayName, and description.
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of packs matching the applied filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /packs/{packId}:
    get:
      operationId: getPack
      summary: Get full detail for a single pack
      description: |
        Returns the full pack detail including lifecycle, dependencies, eligibility,
        content summary, adapter requirements, configuration keys, and capability
        contributions.

        The response shape mirrors the canonical pack manifest structure from
        `packages/contracts/pack-manifests/{packId}.json`.
      tags: [packs]
      parameters:
        - $ref: '#/components/parameters/PackIdPath'
      responses:
        '200':
          description: Pack detail returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /system-config:
    get:
      operationId: getSystemConfig
      summary: Get current platform system configuration
      description: |
        Returns a read-only snapshot of the platform system configuration including
        deployment profile, feature flags, and system parameters.

        This is an operator review endpoint. Write operations (toggle feature flags,
        update parameters) require a dedicated system-configuration write API that is
        not part of this contract.
      tags: [system-config]
      responses:
        '200':
          description: System configuration snapshot returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemConfigSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    operatorBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Operator authentication token. The identity provider and token format are
        implementation-specific. This contract requires only that the token carry
        operator identity and permission claims. The `requestedBy` audit field
        is derived from this token, not from request body fields.

  parameters:
    LegalMarketIdPath:
      name: legalMarketId
      in: path
      required: true
      description: Legal-market identifier (ISO 3166-1 alpha-2, optionally qualified).
      schema:
        type: string
        pattern: '^[A-Z]{2}(-[A-Z0-9]{1,8})?$'
        examples:
          - PH
          - US
          - US-VA

    BootstrapRequestIdPath:
      name: bootstrapRequestId
      in: path
      required: true
      description: Unique identifier for the tenant bootstrap request.
      schema:
        type: string
        format: uuid

    ProvisioningRunIdPath:
      name: provisioningRunId
      in: path
      required: true
      description: Unique identifier for the provisioning run.
      schema:
        type: string
        format: uuid

    TenantIdPath:
      name: tenantId
      in: path
      required: true
      description: Unique tenant identifier.
      schema:
        type: string

    PageParam:
      name: page
      in: query
      required: false
      description: Page number (1-based). Defaults to 1.
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Number of items per page. Defaults to 25, maximum 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

    PackIdPath:
      name: packId
      in: path
      required: true
      description: Unique pack identifier (e.g., "lang-en", "regulatory-philhealth-doh").
      schema:
        type: string
        pattern: '^[a-z][a-z0-9-]*$'

  schemas:
    # --- Request schemas ---

    PlanResolutionRequest:
      type: object
      description: Input for resolving an effective-tenant-configuration plan.
      required:
        - legalMarketId
      properties:
        legalMarketId:
          type: string
          pattern: '^[A-Z]{2}(-[A-Z0-9]{1,8})?$'
          description: Target legal market.
        tenantDisplayName:
          type: string
          description: Human-readable tenant name for the plan resolution context.
        facilityType:
          type: string
          description: Facility type identifier (e.g., single-clinic, hospital, multi-facility). Affects pack eligibility.
        selectedPacks:
          type: array
          items:
            type: string
          default: []
          description: Pack IDs the operator wishes to activate beyond defaults. Must be in the profile's eligiblePacks.
        deselectedDefaults:
          type: array
          items:
            type: string
          default: []
          description: Default-on pack IDs the operator wishes to deactivate. Subject to deactivation constraints.
        selectedPayers:
          type: array
          items:
            type: string
          default: []
          description: Payer pack IDs the operator wishes to include.
        selectedSpecialties:
          type: array
          items:
            type: string
          default: []
          description: Specialty/content pack IDs the operator wishes to include.

    TenantBootstrapRequest:
      type: object
      description: Operator-initiated bootstrap request referencing a resolved plan.
      required:
        - effectivePlanId
        - tenantDisplayName
      properties:
        effectivePlanId:
          type: string
          format: uuid
          description: Reference to a previously resolved effective-tenant-configuration plan.
        tenantDisplayName:
          type: string
          description: Human-readable name for the new tenant.
          minLength: 1
          maxLength: 256
        tenantNotes:
          type: string
          description: Operator notes about this bootstrap request.
          maxLength: 2048

    ProvisioningRunRequest:
      type: object
      description: Request to initiate a provisioning run for an approved bootstrap request.
      required:
        - bootstrapRequestId
      properties:
        bootstrapRequestId:
          type: string
          format: uuid
          description: Reference to the approved tenant bootstrap request.

    # --- Response schemas ---

    PaginationMeta:
      type: object
      description: Pagination metadata included in all list responses.
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page:
          type: integer
          description: Current page number (1-based).
        pageSize:
          type: integer
          description: Items per page.
        totalItems:
          type: integer
          description: Total number of items matching the filter.
        totalPages:
          type: integer
          description: Total number of pages.

    TenantSummary:
      type: object
      description: Lightweight tenant record for list views.
      required: [tenantId, displayName, status, legalMarketId, createdAt]
      properties:
        tenantId:
          type: string
        displayName:
          type: string
        status:
          type: string
          enum: [active, suspended, archived, provisioning, bootstrap-pending]
        legalMarketId:
          type: string
        launchTier:
          type: string
          enum: [T0, T1, T2, T3]
        createdAt:
          type: string
          format: date-time

    TenantDetail:
      type: object
      description: Full tenant record with bootstrap and provisioning references.
      required: [tenantId, displayName, status, legalMarketId, createdAt]
      properties:
        tenantId:
          type: string
        displayName:
          type: string
        status:
          type: string
          enum: [active, suspended, archived, provisioning, bootstrap-pending]
        legalMarketId:
          type: string
        launchTier:
          type: string
          enum: [T0, T1, T2, T3]
        bootstrapRequestId:
          type: string
          format: uuid
          description: Reference to the bootstrap request that created this tenant.
        latestProvisioningRunId:
          type: string
          format: uuid
          description: Most recent provisioning run for this tenant.
        activePacks:
          type: array
          items:
            $ref: '#/components/schemas/PackReference'
          description: Currently active packs for this tenant.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TenantListResponse:
      type: object
      description: Paginated list of tenant summaries.
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TenantSummary'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    LegalMarketProfileListResponse:
      type: object
      description: Paginated list of legal-market profile summaries.
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LegalMarketProfileSummary'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    BootstrapRequestListResponse:
      type: object
      description: Paginated list of bootstrap request summaries.
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TenantBootstrapRequestStatus'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    ProvisioningRunListResponse:
      type: object
      description: Paginated list of provisioning run summaries.
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProvisioningRunStatus'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    LegalMarketProfileSummary:
      type: object
      description: |
        Summary of a legal-market profile for operator review.
        Wraps the canonical legal-market-profile data with API-level metadata.
        Does not imply production readiness — check `status` and `launchTier` fields.
      required:
        - legalMarketId
        - version
        - displayName
        - status
        - launchTier
        - mandatedPackCount
        - defaultOnPackCount
        - eligiblePackCount
        - excludedPackCount
        - readinessDimensions
      properties:
        legalMarketId:
          type: string
        version:
          type: string
          description: Profile version (semver).
        displayName:
          type: string
        status:
          type: string
          enum: [draft, active, deprecated, retired]
        launchTier:
          type: string
          enum: [T0, T1, T2, T3]
        mandatedPackCount:
          type: integer
          description: Number of mandated packs in this profile.
        defaultOnPackCount:
          type: integer
          description: Number of default-on packs in this profile.
        eligiblePackCount:
          type: integer
          description: Number of eligible (opt-in) packs in this profile.
        excludedPackCount:
          type: integer
          description: Number of excluded packs in this profile.
        readinessDimensions:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessDimensionSummary'
          description: Per-dimension readiness snapshot.
        mandatedPacks:
          type: array
          items:
            $ref: '#/components/schemas/PackReference'
        defaultOnPacks:
          type: array
          items:
            $ref: '#/components/schemas/PackReference'
        eligiblePacks:
          type: array
          items:
            $ref: '#/components/schemas/PackReference'

    PlanResolutionResult:
      type: object
      description: |
        Result of resolving an effective-tenant-configuration plan.
        Contains the full resolved plan plus API-level metadata.
        Deferred items and gating blockers are first-class fields — a plan
        with deferred items is still a valid resolution result.
      required:
        - effectivePlanId
        - legalMarketId
        - resolvedAt
        - resolvedPacks
        - deferredItems
        - readinessPosture
        - tenantSelections
      properties:
        effectivePlanId:
          type: string
          format: uuid
          description: Unique ID for this plan resolution snapshot.
        legalMarketId:
          type: string
        profileVersion:
          type: string
          description: Version of the legal-market profile used for resolution.
        resolverVersion:
          type: string
          description: Version of the resolver algorithm used.
        resolvedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of resolution.
        resolvedPacks:
          type: array
          items:
            $ref: '#/components/schemas/ResolvedPackEntry'
          description: Packs that will be activated with their current states.
        deferredItems:
          type: array
          items:
            $ref: '#/components/schemas/DeferredItemEntry'
          description: Packs that cannot be activated, with explicit reasons.
        readinessPosture:
          $ref: '#/components/schemas/ReadinessPosture'
          description: Aggregate readiness with effective launch tier and gating blockers.
        tenantSelections:
          $ref: '#/components/schemas/TenantSelectionsRecord'
          description: Record of operator selections for auditability and re-resolution.

    TenantBootstrapRequestResponse:
      type: object
      description: Confirmation of a queued bootstrap request.
      required:
        - bootstrapRequestId
        - tenantId
        - effectivePlanId
        - status
        - correlationId
        - createdAt
      properties:
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
          description: Assigned tenant identifier.
        effectivePlanId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, provisioning, completed, failed, cancelled]
          description: Current status of the bootstrap request.
        correlationId:
          type: string
          format: uuid
          description: End-to-end workflow correlation identifier for tracing.
        createdAt:
          type: string
          format: date-time

    TenantBootstrapRequestStatus:
      type: object
      description: Full status of a bootstrap request including linked provisioning state.
      required:
        - bootstrapRequestId
        - tenantId
        - effectivePlanId
        - legalMarketId
        - status
        - correlationId
        - createdAt
      properties:
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        effectivePlanId:
          type: string
          format: uuid
        legalMarketId:
          type: string
        tenantDisplayName:
          type: string
        status:
          type: string
          enum: [pending, approved, provisioning, completed, failed, cancelled]
        correlationId:
          type: string
          format: uuid
        provisioningRunId:
          type: string
          format: uuid
          description: Present when provisioning has been initiated.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProvisioningRunResponse:
      type: object
      description: Confirmation that a provisioning run has been accepted and queued.
      required:
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
        - status
        - correlationId
        - createdAt
      properties:
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        status:
          type: string
          enum: [queued, in-progress, completed, failed]
          description: Initial status is always `queued`.
        correlationId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    ProvisioningRunStatus:
      type: object
      description: |
        Full status of a provisioning run.
        Includes step-level detail, blockers, failures, and linked artifact references.
      required:
        - provisioningRunId
        - bootstrapRequestId
        - tenantId
        - effectivePlanId
        - legalMarketId
        - status
        - correlationId
        - steps
        - createdAt
      properties:
        provisioningRunId:
          type: string
          format: uuid
        bootstrapRequestId:
          type: string
          format: uuid
        tenantId:
          type: string
        effectivePlanId:
          type: string
          format: uuid
        legalMarketId:
          type: string
        status:
          type: string
          enum: [queued, in-progress, completed, failed]
        correlationId:
          type: string
          format: uuid
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ProvisioningStepSummary'
          description: Ordered list of provisioning steps with per-step status.
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/ProvisioningBlocker'
          default: []
          description: Blockers preventing provisioning progress.
        failures:
          type: array
          items:
            $ref: '#/components/schemas/ProvisioningFailure'
          default: []
          description: Step failures encountered during the run.
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          description: When the provisioning orchestrator began executing. Absent if still queued.
        completedAt:
          type: string
          format: date-time
          description: When the run reached a terminal state (completed or failed). Absent if still running.

    # --- Shared component schemas ---

    ReadinessDimensionSummary:
      type: object
      required: [dimension, state]
      properties:
        dimension:
          type: string
          description: Readiness dimension name (language, regulatory, payer, etc.).
        state:
          type: string
          enum: [declared, specified, implemented, validated, verified, claimable, production-eligible, deprecated, retired]
        scopeBounds:
          type: string
          description: Scope within which this readiness state applies.

    PackReference:
      type: object
      required: [packId, packFamily]
      properties:
        packId:
          type: string
        packFamily:
          type: string
          enum: [language, locale, regulatory, national-standards, payer, specialty, tenant-overlay]
        displayName:
          type: string
        lifecycleState:
          type: string
          enum: [draft, validated, tested, published, activated, deactivated, retired]

    ResolvedPackEntry:
      type: object
      required: [packId, packFamily, activationSource, packState, readinessState]
      properties:
        packId:
          type: string
        packFamily:
          type: string
          enum: [language, locale, regulatory, national-standards, payer, specialty, tenant-overlay]
        activationSource:
          type: string
          enum: [mandated, default-on, operator-selected, dependency-required, tenant-override]
        packState:
          type: string
          enum: [draft, validated, tested, published, activated, deactivated, retired]
        readinessState:
          type: string
          enum: [declared, specified, implemented, validated, verified, claimable, production-eligible, deprecated, retired]
        constraints:
          type: array
          items:
            type: string
          default: []

    DeferredItemEntry:
      type: object
      required: [packId, reason]
      properties:
        packId:
          type: string
        packFamily:
          type: string
          enum: [language, locale, regulatory, national-standards, payer, specialty, tenant-overlay]
        reason:
          type: string
          enum: [pack-not-published, adapter-unavailable, dependency-missing, eligibility-failed, readiness-insufficient, infrastructure-pending]
        migrationPath:
          type: string
          description: What must change for this pack to become resolvable.
        targetState:
          type: string
          description: The readiness state required for this pack to be resolved.

    ReadinessPosture:
      type: object
      required: [dimensions, effectiveLaunchTier]
      properties:
        dimensions:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessDimensionSummary'
        effectiveLaunchTier:
          type: string
          enum: [T0, T1, T2, T3]
          description: Effective launch tier after accounting for deferred items and degraded dimensions.
        gatingBlockers:
          type: array
          items:
            $ref: '#/components/schemas/GatingBlocker'
          default: []

    GatingBlocker:
      type: object
      required: [dimension, blockerType, description]
      properties:
        dimension:
          type: string
        blockerType:
          type: string
          description: Category of blocker (e.g., pack-not-published, adapter-unavailable, infrastructure-pending).
        description:
          type: string

    TenantSelectionsRecord:
      type: object
      description: Record of operator selections for auditability.
      properties:
        selectedPacks:
          type: array
          items:
            type: string
          default: []
        deselectedDefaults:
          type: array
          items:
            type: string
          default: []
        facilityType:
          type: string
        selectedPayers:
          type: array
          items:
            type: string
          default: []
        selectedSpecialties:
          type: array
          items:
            type: string
          default: []

    ProvisioningStepSummary:
      type: object
      required: [stepId, stepName, status]
      properties:
        stepId:
          type: string
          description: Unique step identifier within the run.
        stepName:
          type: string
          description: Human-readable step name (e.g., 'tenant-database-init', 'pack-activation', 'adapter-initialization').
        status:
          type: string
          enum: [pending, in-progress, completed, failed, skipped]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        detail:
          type: string
          description: Optional detail about step outcome.

    ProvisioningBlocker:
      type: object
      required: [blockerType, description]
      properties:
        blockerType:
          type: string
          description: Category (dependency-unavailable, adapter-integration-pending, infrastructure-missing, readiness-insufficient).
        description:
          type: string
        affectedStep:
          type: string
          description: Step ID that is blocked.

    ProvisioningFailure:
      type: object
      required: [stepId, failureType, description]
      properties:
        stepId:
          type: string
        failureType:
          type: string
          description: Category (infrastructure-error, adapter-error, dependency-error, timeout, unknown).
        description:
          type: string
        occurredAt:
          type: string
          format: date-time

    # --- Pack catalog schemas ---

    PackListResponse:
      type: object
      description: Paginated list of packs from the pack catalog.
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PackSummary'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PackSummary:
      type: object
      description: Summary representation of a pack for list views.
      required: [packId, displayName, packFamily, version, lifecycleState]
      properties:
        packId:
          type: string
          description: Unique pack identifier (e.g., "lang-en", "regulatory-philhealth-doh").
        displayName:
          type: string
          description: Human-readable pack name.
        description:
          type: string
          description: Brief description of the pack's purpose.
        packFamily:
          type: string
          enum: [language, locale, regulatory, national-standards, payer, specialty, tenant-overlay]
        version:
          type: string
          description: Semver version of the pack manifest.
        lifecycleState:
          type: string
          enum: [draft, validated, tested, published, activated, deactivated, retired]
        eligibleMarkets:
          type: array
          items:
            type: string
          description: Legal-market IDs this pack is eligible for. Empty array means universally eligible.

    PackDetail:
      type: object
      description: |
        Full pack detail mirroring the canonical pack manifest structure.
        Includes lifecycle, dependencies, eligibility, content summary, adapter
        requirements, configuration keys, and capability contributions.
      required:
        - packId
        - displayName
        - description
        - packFamily
        - version
        - lifecycle
      properties:
        packId:
          type: string
        displayName:
          type: string
        description:
          type: string
        packFamily:
          type: string
          enum: [language, locale, regulatory, national-standards, payer, specialty, tenant-overlay]
        version:
          type: string
        lifecycle:
          $ref: '#/components/schemas/PackLifecycle'
        attachment:
          type: object
          properties:
            primaryEntity:
              type: string
              description: Primary entity this pack attaches to (e.g., "tenant", "legal-market").
            overrideScopes:
              type: array
              items:
                type: string
              description: Scopes at which this pack's configuration can be overridden.
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/PackDependency'
          default: []
        eligibility:
          $ref: '#/components/schemas/PackEligibility'
        contentSummary:
          $ref: '#/components/schemas/PackContentSummary'
        adapterRequirements:
          type: array
          items:
            $ref: '#/components/schemas/PackAdapterRequirement'
          default: []
        configurationKeys:
          type: array
          items:
            $ref: '#/components/schemas/PackConfigurationKey'
          default: []
        capabilityContributions:
          type: array
          items:
            $ref: '#/components/schemas/PackCapabilityContribution'
          default: []

    PackLifecycle:
      type: object
      description: Pack lifecycle state and ownership metadata.
      required: [state]
      properties:
        state:
          type: string
          enum: [draft, validated, tested, published, activated, deactivated, retired]
        owner:
          type: string
          description: Team or individual owning this pack.
        implementationLocus:
          type: string
          description: Where this pack is implemented (e.g., "platform", "distro").
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time

    PackDependency:
      type: object
      description: Dependency on another pack.
      required: [packId, type]
      properties:
        packId:
          type: string
        type:
          type: string
          enum: [required, optional]
        rationale:
          type: string

    PackEligibility:
      type: object
      description: Eligibility constraints for this pack.
      properties:
        legalMarkets:
          type: array
          items:
            type: string
          default: []
          description: Legal-market IDs this pack is eligible for. Empty means universally eligible.
        facilityTypes:
          type: array
          items:
            type: string
          default: []
        serviceLines:
          type: array
          items:
            type: string
          default: []
        infrastructureRequirements:
          type: array
          items:
            type: string
          default: []
        licenseRequirements:
          type: array
          items:
            type: string
          default: []

    PackContentSummary:
      type: object
      description: |
        Summary of pack content. Common fields are typed; pack-family-specific
        fields use additionalProperties.
      properties:
        contentTypes:
          type: array
          items:
            type: string
          description: Types of content in this pack (e.g., "translations", "coding-tables", "connector-config").
        artifactCount:
          type: integer
          description: Number of content artifacts (0 for draft packs with no implemented artifacts).
      additionalProperties: true

    PackAdapterRequirement:
      type: object
      description: External adapter required by this pack.
      required: [adapterId, adapterType, required]
      properties:
        adapterId:
          type: string
        adapterType:
          type: string
          description: Adapter category (e.g., "external-system").
        required:
          type: boolean
        fallbackBehavior:
          type: string
          description: Behavior when the adapter is unavailable (e.g., "integration-pending").

    PackConfigurationKey:
      type: object
      description: Configuration key provided or consumed by this pack.
      required: [key, action]
      properties:
        key:
          type: string
          description: Dot-separated configuration key (e.g., "locale.dateFormat").
        action:
          type: string
          enum: [provides, consumes]
          description: Whether this pack provides a value for this key or consumes one.
        description:
          type: string

    PackCapabilityContribution:
      type: object
      description: Capability that this pack contributes to.
      required: [capabilityId, contributionType]
      properties:
        capabilityId:
          type: string
          description: ID of the capability this pack contributes to.
        contributionType:
          type: string
          enum: [required, optional]
        description:
          type: string

    # --- System configuration schemas ---

    SystemConfigSnapshot:
      type: object
      description: |
        Read-only snapshot of current platform system configuration.
        Write operations on feature flags and parameters are deferred to a
        dedicated system-configuration write API.
      required:
        - deploymentProfile
        - featureFlags
        - systemParameters
        - lastUpdatedAt
      properties:
        deploymentProfile:
          $ref: '#/components/schemas/DeploymentProfileSummary'
        featureFlags:
          type: array
          items:
            $ref: '#/components/schemas/FeatureFlagSummary'
          description: All platform feature flags with current state.
        systemParameters:
          type: array
          items:
            $ref: '#/components/schemas/SystemParameterSummary'
          description: System parameters grouped by category.
        lastUpdatedAt:
          type: string
          format: date-time
          description: When the system configuration was last modified.

    DeploymentProfileSummary:
      type: object
      description: Current deployment profile and runtime environment.
      required: [profileName, runtimeMode, apiVersion, platformVersion]
      properties:
        profileName:
          type: string
          description: Active deployment profile (e.g., "development", "staging", "production").
        runtimeMode:
          type: string
          enum: [dev, test, rc, prod]
          description: Platform runtime mode.
        apiVersion:
          type: string
          description: Current API version.
        platformVersion:
          type: string
          description: Platform semver version.

    FeatureFlagSummary:
      type: object
      description: A single feature flag with current state.
      required: [flagKey, displayName, enabled, scope]
      properties:
        flagKey:
          type: string
          description: Machine-readable flag key.
        displayName:
          type: string
          description: Human-readable flag name.
        enabled:
          type: boolean
          description: Current toggle state.
        scope:
          type: string
          description: Flag scope (e.g., "platform-wide", "per-tenant").
        updatedAt:
          type: string
          format: date-time
          description: When this flag was last toggled.

    SystemParameterSummary:
      type: object
      description: A single configurable system parameter.
      required: [category, paramKey, value]
      properties:
        category:
          type: string
          description: Parameter category (e.g., "security", "performance", "integration", "observability").
        paramKey:
          type: string
          description: Parameter key name.
        value:
          type: string
          description: Current parameter value.
        defaultValue:
          type: string
          description: Default value for comparison.
        description:
          type: string
          description: Human-readable description of what this parameter controls.

    # --- Error schemas ---

    ErrorResponse:
      type: object
      description: Standard error response.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code.
              enum:
                - VALIDATION_FAILED
                - READINESS_BLOCKED
                - ELIGIBILITY_BLOCKED
                - DEPENDENCY_UNAVAILABLE
                - INTEGRATION_PENDING
                - ARTIFACT_NOT_FOUND
                - CONFLICT
                - UNAUTHORIZED
                - FORBIDDEN
                - INTERNAL_ERROR
            message:
              type: string
              description: Human-readable error description.
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  reason:
                    type: string
              description: Optional field-level validation details.

  responses:
    Unauthorized:
      description: Authentication required. No valid operator token provided.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Authenticated operator lacks required permission for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Requested resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Request body failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
