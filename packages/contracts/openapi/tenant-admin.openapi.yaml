components:
  parameters:
    tenantId:
      name: tenantId
      in: query
      required: true
      schema: { type: string }
      description: Tenant identifier
    ien:
      name: ien
      in: path
      required: true
      schema: { type: string }
      description: VistA internal entry number
    duz:
      name: duz
      in: path
      required: true
      schema: { type: string }
      description: VistA user DUZ (File 200 IEN)
    userId:
      name: userId
      in: path
      required: true
      schema: { type: string }
      description: User identifier (DUZ)
  responses:
    RpcNotRegistered:
      description: Required RPC not registered in VistA. Install the corresponding M routine.
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: false }
              integrationPending: { type: boolean, example: true }
              error: { type: string }
