openapi: 3.0.3
info:
  title: Site Administration Console API
  version: 1.0.0
  description: |
    VistA-first administration API served by `apps/tenant-admin/server.mjs`.
    All routes require `tenantId` query parameter.
    Reads use DDR LISTER/GETS or standard VistA RPCs.
    Writes use DDR VALIDATOR/FILER or distro overlay RPCs (ZVE*).
    Routes returning 501 indicate the required M routine is not installed.
servers:
  - url: http://127.0.0.1:4520/api/tenant-admin/v1
tags:
  - name: Auth
    description: Session authentication via VistA XWB broker
  - name: System Status
    description: VistA connectivity and dashboard
  - name: Users & Access
    description: User management, keys, e-signatures (File 200, 19.1)
  - name: Facilities & Locations
    description: Facilities, clinics, wards, beds, specialties (Files 4, 44, 42, 405.4, 44.1)
  - name: Clinical Config
    description: Orders, TIU, pharmacy, lab, radiology, nursing, health summary
  - name: Billing & Insurance
    description: Billing parameters, insurance, encounter forms, claims
  - name: System & Kernel
    description: Kernel params, TaskMan, MailMan, menus, packages, error trap
  - name: Devices & Connectivity
    description: Devices, terminal types, HL7, RPC broker
  - name: Monitoring & Reports
    description: Audit, reports, error logs
  - name: VistA Tools
    description: DDR probe, raw FileMan, capacity planning

paths:
  # === Auth ===
  /auth/login:
    post:
      tags: [Auth]
      summary: Login via VistA XWB broker
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [accessCode, verifyCode]
              properties:
                accessCode: { type: string }
                verifyCode: { type: string }
      responses:
        '200': { description: Session created with Bearer token }
        '401': { description: Invalid credentials }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Destroy session
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Session destroyed }
  /auth/session:
    get:
      tags: [Auth]
      summary: Current session info (DUZ, keys, user name)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Session details }
        '401': { description: No active session }

  # === System Status ===
  /vista-status:
    get:
      tags: [System Status]
      summary: Broker connectivity + current user
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: VistA connection status }
  /vista/ddr-probe:
    get:
      tags: [System Status]
      summary: DDR RPC family probe (read-safe)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: DDR capability results }
  /dashboard:
    get:
      tags: [System Status]
      summary: Dashboard counts and VistA grounding status
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Aggregate counts by domain }

  # === Users & Access ===
  /users:
    get:
      tags: [Users & Access]
      summary: List users (ORWU NEWPERS)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: search, in: query, schema: { type: string } }
      responses:
        '200': { description: User list }
    post:
      tags: [Users & Access]
      summary: Create user (ZVE USMG ADD)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [newName]
              properties:
                newName: { type: string }
      responses:
        '200': { description: User created }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{userId}:
    get:
      tags: [Users & Access]
      summary: User detail (DDR GETS File 200)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/userId'
      responses:
        '200': { description: User detail with identity, contact, keys }
  /users/{ien}:
    put:
      tags: [Users & Access]
      summary: Edit user contact fields (DDR VALIDATOR + DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: ien, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [field, value]
              properties:
                field: { type: string }
                value: { type: string }
      responses:
        '200': { description: Field updated }
        '400': { description: Validation failed }
  /users/clone:
    post:
      tags: [Users & Access]
      summary: Clone user with keys (ZVE USMG ADD + ZVE USER CLONE)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [newName, sourceDuz]
              properties:
                newName: { type: string }
                sourceDuz: { type: string }
      responses:
        '200': { description: User cloned }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{targetDuz}/keys:
    post:
      tags: [Users & Access]
      summary: Assign security key (ZVE USMG KEYS)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: targetDuz, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [keyName]
              properties:
                keyName: { type: string }
      responses:
        '200': { description: Key assigned }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{targetDuz}/keys/{keyId}:
    delete:
      tags: [Users & Access]
      summary: Remove security key (ZVE USMG KEYS DEL)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: targetDuz, in: path, required: true, schema: { type: string } }
        - { name: keyId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Key removed }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{duz}/esig:
    post:
      tags: [Users & Access]
      summary: Set e-signature code (ZVE USMG ESIG)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200': { description: E-sig set }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{duz}/credentials:
    put:
      tags: [Users & Access]
      summary: Reset access/verify codes (ZVE USMG CRED)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [accessCode, verifyCode]
              properties:
                accessCode: { type: string }
                verifyCode: { type: string }
      responses:
        '200': { description: Credentials reset }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{duz}/rename:
    put:
      tags: [Users & Access]
      summary: Rename user (ZVE USMG RENAME)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [newName]
              properties:
                newName: { type: string }
      responses:
        '200': { description: User renamed }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{duz}/provider:
    post:
      tags: [Users & Access]
      summary: Edit provider credentials (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                npi: { type: string }
                dea: { type: string }
                taxId: { type: string }
      responses:
        '200': { description: Provider info updated }
  /users/{duz}/deactivate:
    post:
      tags: [Users & Access]
      summary: Deactivate user (ZVE USMG DEACT)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      responses:
        '200': { description: User deactivated }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{duz}/reactivate:
    post:
      tags: [Users & Access]
      summary: Reactivate user (ZVE USMG REACT)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      responses:
        '200': { description: User reactivated }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{duz}/terminate:
    post:
      tags: [Users & Access]
      summary: Terminate user (ZVE USMG TERM)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      responses:
        '200': { description: User terminated }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /users/{duz}/file-access:
    get:
      tags: [Users & Access]
      summary: User file access security (DDR GETS File 200)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      responses:
        '200': { description: File access permissions }
  /users/{duz}/access-audit:
    get:
      tags: [Users & Access]
      summary: User access audit trail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/duz'
      responses:
        '200': { description: Audit entries for user }
  /roles:
    get:
      tags: [Users & Access]
      summary: Security key list (DDR LISTER File 19.1)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Key/role list }
  /key-inventory:
    get:
      tags: [Users & Access]
      summary: Key inventory with holder counts
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: category, in: query, schema: { type: string } }
      responses:
        '200': { description: Key inventory }
  /key-holders/{keyName}:
    get:
      tags: [Users & Access]
      summary: Users holding a specific key
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: keyName, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Holder list }
  /key-impact:
    post:
      tags: [Users & Access]
      summary: Key impact preview (nav groups, role cluster)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [keys]
              properties:
                keys: { type: array, items: { type: string } }
      responses:
        '200': { description: Impact analysis }
  /esig-status:
    get:
      tags: [Users & Access]
      summary: E-signature status summary across all users
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: E-sig status list }
  /security-keys:
    post:
      tags: [Users & Access]
      summary: Create security key (DDR FILER File 19.1)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '200': { description: Key created }
  /titles:
    get:
      tags: [Users & Access]
      summary: Title list (DDR LISTER File 3.1)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Title list }
    post:
      tags: [Users & Access]
      summary: Create title (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200': { description: Title created }
  /titles/{ien}:
    get:
      tags: [Users & Access]
      summary: Title detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Title detail }
    put:
      tags: [Users & Access]
      summary: Edit title (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: Title updated }

  # === Facilities & Locations ===
  /facilities:
    get:
      tags: [Facilities & Locations]
      summary: Facility list (DDR LISTER File 4)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Facility list }
  /facilities/{facilityId}:
    get:
      tags: [Facilities & Locations]
      summary: Facility detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: facilityId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Facility detail }
  /topology:
    get:
      tags: [Facilities & Locations]
      summary: Facility topology hierarchy
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Hierarchy tree }
  /clinics:
    get:
      tags: [Facilities & Locations]
      summary: Clinic list (DDR LISTER File 44)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - { name: search, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
      responses:
        '200': { description: Clinic list }
    post:
      tags: [Facilities & Locations]
      summary: Create clinic (ZVE CLNM ADD)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200': { description: Clinic created }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /clinics/{ien}:
    get:
      tags: [Facilities & Locations]
      summary: Clinic detail (DDR GETS File 44)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Clinic detail }
    put:
      tags: [Facilities & Locations]
      summary: Edit clinic (ZVE CLNM EDIT or DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: Clinic updated }
        '501': { $ref: '#/components/responses/RpcNotRegistered' }
  /clinics/{ien}/fields:
    put:
      tags: [Facilities & Locations]
      summary: Edit clinic fields (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [field, value]
              properties:
                field: { type: string }
                value: { type: string }
      responses:
        '200': { description: Field updated }
  /clinics/{ien}/availability:
    get:
      tags: [Facilities & Locations]
      summary: Clinic availability slots
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Availability data }
    post:
      tags: [Facilities & Locations]
      summary: Set clinic availability
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Availability updated }
  /clinics/{ien}/inactivate:
    post:
      tags: [Facilities & Locations]
      summary: Inactivate clinic
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Clinic inactivated }
  /clinics/{ien}/reactivate:
    post:
      tags: [Facilities & Locations]
      summary: Reactivate clinic
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Clinic reactivated }
  /wards:
    get:
      tags: [Facilities & Locations]
      summary: Ward list (DDR LISTER File 42)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Ward list }
    post:
      tags: [Facilities & Locations]
      summary: Create ward (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200': { description: Ward created }
  /wards/{ien}:
    get:
      tags: [Facilities & Locations]
      summary: Ward detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Ward detail }
    put:
      tags: [Facilities & Locations]
      summary: Edit ward (ZVE WRDM EDIT or DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: Ward updated }
  /wards/{ien}/fields:
    put:
      tags: [Facilities & Locations]
      summary: Edit ward fields (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [field, value]
              properties:
                field: { type: string }
                value: { type: string }
      responses:
        '200': { description: Field updated }
  /room-beds:
    get:
      tags: [Facilities & Locations]
      summary: Room-bed list (DDR LISTER File 405.4)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Room-bed list }
    post:
      tags: [Facilities & Locations]
      summary: Create room-bed (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200': { description: Room-bed created }
  /room-beds/{ien}:
    get:
      tags: [Facilities & Locations]
      summary: Room-bed detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Room-bed detail }
    put:
      tags: [Facilities & Locations]
      summary: Edit room-bed (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Room-bed updated }
  /treating-specialties:
    get:
      tags: [Facilities & Locations]
      summary: Treating specialties (DDR LISTER File 45.7)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Specialty list }
  /treating-specialties/{ien}:
    get:
      tags: [Facilities & Locations]
      summary: Specialty detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Specialty detail }
    put:
      tags: [Facilities & Locations]
      summary: Edit specialty (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Specialty updated }
  /appointment-types:
    get:
      tags: [Facilities & Locations]
      summary: Appointment type list (DDR LISTER File 409.1)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Appointment type list }
    post:
      tags: [Facilities & Locations]
      summary: Create appointment type (DDR FILER)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Appointment type created }
  /appointment-types/{ien}:
    get:
      tags: [Facilities & Locations]
      summary: Appointment type detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Detail }
    put:
      tags: [Facilities & Locations]
      summary: Edit appointment type
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Updated }
  /appointment-types/{ien}/inactivate:
    post:
      tags: [Facilities & Locations]
      summary: Inactivate appointment type
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Inactivated }
  /appointment-types/{ien}/reactivate:
    post:
      tags: [Facilities & Locations]
      summary: Reactivate appointment type
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Reactivated }
  /stop-codes:
    get:
      tags: [Facilities & Locations]
      summary: Stop code list
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Stop code list }
  /nursing-locations:
    get:
      tags: [Facilities & Locations]
      summary: Nursing location list
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Nursing locations }
  /nursing-locations/{ien}:
    get:
      tags: [Facilities & Locations]
      summary: Nursing location detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Detail }
    put:
      tags: [Facilities & Locations]
      summary: Edit nursing location
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Updated }

  # === Clinical Config ===
  /quick-orders:
    get:
      tags: [Clinical Config]
      summary: Quick order list (DDR LISTER File 101.41)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Quick order list }
  /quick-orders/{ien}:
    get:
      tags: [Clinical Config]
      summary: Quick order detail
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Quick order detail }
    put:
      tags: [Clinical Config]
      summary: Edit quick order
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - $ref: '#/components/parameters/ien'
      responses:
        '200': { description: Updated }
  /order-sets:
    get:
      tags: [Clinical Config]
      summary: Order set list (DDR LISTER File 101.44)
      parameters:
        - $ref: '#/components/parameters/tenantId'
      responses:
        '200': { description: Order set list }
  /order-sets/{ien}:
    get:
